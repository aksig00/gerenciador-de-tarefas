<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Tarefas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .form-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .name-row {
      margin-bottom: 8px;
    }

    .name-row input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #e5e5e3;
      border-radius: 8px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafaf9;
      outline: none;
    }

    .name-row input:focus {
      border-color: #999;
      background: #fff;
    }

    .form-row {
      display: flex;
      gap: 8px;
    }

    .form-row input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #e5e5e3;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafaf9;
      outline: none;
    }

    .form-row input:focus {
      border-color: #999;
      background: #fff;
    }

    .form-row button {
      height: 40px;
      padding: 0 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .form-row button:hover {
      opacity: 0.85;
    }

    .form-row button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .stats {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .task-list {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      overflow: hidden;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0ee;
      transition: background 0.1s;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-item:hover {
      background: #fafaf9;
    }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #1a1a1a;
      flex-shrink: 0;
    }

    .task-info {
      flex: 1;
    }

    .task-titulo {
      font-size: 14px;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .task-titulo.feita {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-meta {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .task-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .task-delete:hover {
      color: #e05a5a;
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 14px;
    }

    .status-msg {
      font-size: 13px;
      color: #888;
      text-align: center;
      padding: 0.5rem 0;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Tarefas</h1>

    <div class="form-card">
      <div class="name-row">
        <input type="text" id="input-nome" placeholder="Seu nome (ex: André)" />
      </div>
      <div class="form-row">
        <input type="text" id="input-titulo" placeholder="Nova tarefa..." />
        <button id="btn-add" onclick="adicionarTarefa()">+ Adicionar</button>
      </div>
    </div>

    <div class="status-msg" id="status"></div>
    <div class="stats" id="stats"></div>
    <div class="section-label">Lista de tarefas</div>

    <div class="task-list" id="task-list">
      <div class="empty">Carregando tarefas...</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://uydggabwkxnizdrbvrjc.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_6kctEvNSXCS4D7KoJ-TfKg_oLQl29r4' // ← substitua pela sua publishable key

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    let tarefas = []

    async function carregarTarefas() {
      setStatus('Carregando...')
      const { data, error } = await supabase
        .from('tarefas')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) { setStatus('Erro: ' + error.message); return }
      tarefas = data
      setStatus('')
      renderizar()
    }

    async function adicionarTarefa() {
      const titulo = document.getElementById('input-titulo').value.trim()
      const nome = document.getElementById('input-nome').value.trim()
      if (!titulo) return

      const btn = document.getElementById('btn-add')
      btn.disabled = true
      setStatus('Salvando...')

      const { error } = await supabase.from('tarefas').insert({
        titulo,
        feita: false,
        criada_por: nome || 'Anônimo'
      })

      btn.disabled = false
      if (error) { setStatus('Erro: ' + error.message); return }

      document.getElementById('input-titulo').value = ''
      setStatus('')
      await carregarTarefas()
    }

    async function marcarFeita(id, valorAtual) {
      const { error } = await supabase
        .from('tarefas')
        .update({ feita: !valorAtual })
        .eq('id', id)

      if (error) { setStatus('Erro: ' + error.message); return }
      await carregarTarefas()
    }

    async function deletarTarefa(id) {
      const { error } = await supabase
        .from('tarefas')
        .delete()
        .eq('id', id)

      if (error) { setStatus('Erro: ' + error.message); return }
      await carregarTarefas()
    }

    function renderizar() {
      const lista = document.getElementById('task-list')
      const stats = document.getElementById('stats')

      const pendentes = tarefas.filter(t => !t.feita).length
      const total = tarefas.length
      stats.textContent = `${pendentes} pendente${pendentes !== 1 ? 's' : ''} de ${total} tarefa${total !== 1 ? 's' : ''}`

      if (tarefas.length === 0) {
        lista.innerHTML = '<div class="empty">Nenhuma tarefa ainda. Adicione a primeira acima.</div>'
        return
      }

      lista.innerHTML = tarefas.map(t => `
      <div class="task-item">
        <input type="checkbox" ${t.feita ? 'checked' : ''}
          onchange="window._marcar('${t.id}', ${t.feita})" />
        <div class="task-info">
          <div class="task-titulo ${t.feita ? 'feita' : ''}">${t.titulo}</div>
          ${t.criada_por ? `<div class="task-meta">por ${t.criada_por}</div>` : ''}
        </div>
        <button class="task-delete" onclick="window._deletar('${t.id}')" title="Remover">×</button>
      </div>
    `).join('')
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg
    }

    window._marcar = marcarFeita
    window._deletar = deletarTarefa
    window.adicionarTarefa = adicionarTarefa

    document.getElementById('input-titulo').addEventListener('keydown', e => {
      if (e.key === 'Enter') adicionarTarefa()
    })

    carregarTarefas()
  </script>
</body>

</html>
